<h2><a id="a03" name="a03"></a><span class="Stil1">Berechnen Sie Ihr "Normalgewicht"</span></h2>

<p>Es gibt eine einfache Regel, mit der Sie das Normalgewicht berechnen können:</p>

<p>Körpergröße - 100 = Normalgewicht.</p>

<p>Neuere Untersuchungen messen den Bauchumfang.<br />
Ab 94 cm für Männer und 80 cm für Frauen steigt das Risiko für Herz-Kreislauferkrankungen an.</p>
