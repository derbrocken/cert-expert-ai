<h2>Bauspezifisches R&uuml;ckentraining</h2>

<p>Wer ein ganzes Arbeitsleben im
Beruf bestehen will, muss sich
fit halten. Die Arbeit trainiert zwar,
kann aber oft zu einseitigen
Fehlbelastungen f&uuml;hren.</p>

<p>Einfache Entlastungs- und
Kr&auml;ftigungs&uuml;bungen gleichen
diese Defizite aus.</p>
