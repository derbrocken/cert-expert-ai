<H4><center>§ 17 <br>Benutzung von Einrichtungen, Arbeitsmitteln und Arbeitsstoffen</center></H4>

<p>Versicherte haben Einrichtungen, Arbeitsmittel und Arbeitsstoffe sowie Schutzvorrichtungen bestimmungsgemäß und im Rahmen der ihnen übertragenen Arbeitsaufgaben zu benutzen.</p>
