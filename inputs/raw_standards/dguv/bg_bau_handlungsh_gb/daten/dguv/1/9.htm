<H4><center>§ 9 <br>Zutritts- und Aufenthaltsverbote</center></H4>

<p>Der Unternehmer hat dafür zu sorgen, dass Unbefugte Betriebsteile nicht betreten, wenn dadurch eine Gefahr für Sicherheit und Gesundheit entsteht.</p>
