<h2>1 Anwendungsbereich</h2>

<p>1.1 Dieses Kapitel findet Anwendung auf das Betreiben von Druck- und Spritzgie&szlig;maschinen.
</p>

<p>1.2 Dieses Kapitel findet keine Anwendung auf Setzmaschinen, Schriftgie&szlig;maschinen, Gie&szlig;werke und andere Maschinen zur Druckformherstellung.
</p>
