<p>4.11.7 <b>Zugänge zu Arbeitsplätzen</b></p>
<p>Werden Leitern als Zugänge zu Arbeitsplätzen in Bohrungen verwendet, müssen diese der Unfallverhütungsvorschrift "Leitern und Tritte" <!--LINK<a href="../../dguv/74/inhalt.htm">-->(BGV D36)<!--</a>--> entsprechen.</p>
<p></p>
<blockquote><i>Steigleitern siehe <!--LINK<a href="../../dguv/74/15.htm">-->§ 15<!--</a>--> der Unfallverhütungsvorschrift &bdquo;Leitern und Tritte&ldquo; <!--LINK<a href="../../dguv/74/inhalt.htm">-->(BGV D36)<!--</a>-->.</i></blockquote>
