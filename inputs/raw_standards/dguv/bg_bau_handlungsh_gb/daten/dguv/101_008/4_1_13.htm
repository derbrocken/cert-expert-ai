<p>4.1.13 <b>Lagern von Ramm- und Bohrelementen und Bewehrungskörben</b></p>
<p>Ramm- und Bohrelemente sowie Bewehrungskörbe sind so zu lagern, dass sie gegen Abrollen und Abrutschen gesichert sind. Die Entnahme einzelner Elemente muss möglich sein, ohne die Stabilität des restlichen Lagers zu gefährden.</p>
