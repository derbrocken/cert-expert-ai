<h2>9 Zeitpunkt der Anwendung</h2>
<p>Diese Regel ist anzuwenden ab März 2011, soweit nicht Inhalte dieser Regel nach geltenden Rechtsnormen oder als allgemein anerkannte Regeln der Technik bereits zu beachten sind. Sie ersetzt die Regel "Tätigkeiten mit Kühlschmierstoffen" vom Mai 2009.</p>
