<h2>6&nbsp;&nbsp;Aufbewahrung</h2>
<p>Anschlag-Drahtseile, deren Sicherheit durch Witterungseinflüsse und aggressive Stoffe beeinträchtigt werden können, müssen geschützt gelagert werden.</p>
