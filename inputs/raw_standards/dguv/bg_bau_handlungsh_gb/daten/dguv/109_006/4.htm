<h3>4 Prüfung</h3>
<p>Anschlag-Faserseile sind in Abständen, die vom Unternehmer nach einer Gefährdungsbeurteilung festgelegt wurden (BetrSichV §§ <a href="../../gv/betrsichv/10.htm">10</a> und <a href="../../gv/betrsichv/11.htm">11</a>), durch eine befähigte Person prüfen zu lassen und zu dokumentieren.</p>
