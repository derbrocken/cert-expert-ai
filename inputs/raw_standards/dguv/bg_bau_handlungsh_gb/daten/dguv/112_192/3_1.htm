<h3>3.2</h3>
</td>
<td>
<h3>Bereitstellung</h3>
Nach § 2 der PSA-Benutzungsverordnung muss der Unternehmer den Versicherten Augen- und Gesichtsschutz zur Verfügung stellen, wenn die Gefährdungen nicht anders verhindert beziehungsweise ausreichend gemindert werden können.</td>
