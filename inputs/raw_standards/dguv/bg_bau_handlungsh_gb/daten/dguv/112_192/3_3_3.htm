<tr>
<td width="50"><b>3.3.3</b></td>
<td><b>Hygienische Maßnahmen</b></td>
</tr>
<tr>
<td width="50">&nbsp;</td>
<td><br />
Bei der Benutzung können Verunreinigungen, z.B. durch Stäube und Flüssigkeiten, auftreten und Hautreizungen oder sogar Infektionen verursachen. Deshalb ist Augen- und Gesichtsschutz in regelmäßigen Abständen zu reinigen, zu pflegen und gegebenenfalls zu desinfizieren.</td>
</tr>
