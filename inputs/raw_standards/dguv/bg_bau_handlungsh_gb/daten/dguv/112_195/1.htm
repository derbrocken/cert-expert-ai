<h3>1 Anwendungsbereich</h3>
<p>Diese BG-Regel findet Anwendung auf die Auswahl und die Benutzung von Schutzhandschuhen zum Schutz gegen schädigende Einwirkungen mechanischer, thermischer und chemischer Art sowie gegen Mikroorganismen und ionisierende Strahlen.</p>
