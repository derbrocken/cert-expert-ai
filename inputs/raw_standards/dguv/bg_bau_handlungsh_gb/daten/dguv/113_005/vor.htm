<td style="text-align:left; padding:3px;"><p>Arbeiten in Behältern, Silos und engen Räumen sind gefährliche Arbeiten nach
<a href="../../dguv/1/inhalt.htm">§ 8 der DGUV Vorschrift 1 "Grundsätze der Prävention"</a> und <a href="../../gv/jarbschg/22.htm">§ 22 des Jugendarbeitsschutzgesetzes</a>. Für die gefährlichen Arbeiten "Einsteigen" und "Einfahren" besteht ein Beschäftigungsverbot für Jugendliche.</p></td>
