<td width="37"><b>6.7</b></td>
<td colspan="3"><b>Entwässerungseinrichtungen</b></td>
</tr>
<tr>
<td width="37">&nbsp;</td>
<td colspan="3">Der Wasserstand von Entwässerungseinrichtungen ist regelmäßig zu kontrollieren und erforderlichenfalls fehlendes Wasser zu ergänzen.</td>

<td width="10">&nbsp;</td>
