<h4 class="center">&sect; 3<br />Arbeitsmedizinische Fachkunde</h4>
 
 
<p>Der Unternehmer kann die erforderliche arbeitsmedizinische Fachkunde als gegeben ansehen bei &Auml;rzten, die nachweisen, dass sie berechtigt sind,</p>

<ol>
	<li>die Gebietsbezeichnung &bdquo;Arbeitsmedizin&ldquo;<br />oder</li>
	<li>die Zusatzbezeichnung &bdquo;Betriebsmedizin&ldquo;</li>
</ol>

<p>zu f&uuml;hren.</p>


<p>&nbsp;</p>
