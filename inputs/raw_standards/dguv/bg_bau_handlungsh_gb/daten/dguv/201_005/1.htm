<h2>1 Anwendungsbereich</h2>


<p>Diese Handlungsanleitung findet Anwendung bei Arbeiten mit Boden und Grundwasser 
  in Deutschland, die naturgemäß Mikroorganismen enthalten. Bei Tätigkeiten außerhalb 
  Deutschlands müssen gegebenenfalls weitere Gefährdungen berücksichtigt werden, 
  s. hierzu <a href="anh_4.htm">Anhang 4</a>.</p>
