<h2>2 Begriffsbestimmungen</h2>

<p><b>Leitungen</b> sind Kabel, Rohre und Kanäle einschließlich Armaturen, Muffen und Abzweige. Diese Begriffe werden in <!--LINK<a href="../../dguv/38/16.htm">-->§ 16<!--</a>--> Unfallverhütungsvorschrift "Bauarbeiten" (DGUV Vorschriften 38 und 39) auch als "Anlagen" zusammengefasst.</p>
