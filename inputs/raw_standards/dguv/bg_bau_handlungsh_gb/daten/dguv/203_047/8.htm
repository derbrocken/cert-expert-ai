<h2>8 Schutz gegen Absturz bei der Benutzung von Leitungsfahrzeugen</h2>

<p>Versicherte d&uuml;rfen in Leitungsfahrzeuge nur unter Benutzung von PSAgA ein- und aussteigen. In Leitungsfahrzeugen haben sich die Versicherten mit PSAgA an einem Anschlagpunkt im Fahrzeug zu sichern.</p>
