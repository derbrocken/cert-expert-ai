<h2>1 Anwendungsbereich</h2>

<h3 style="color:#004994">1.1</h3>
<p>Diese DGUV Information findet Anwendung auf Lagereinrichtungen und Ladungsträger.</p>
<h3 style="color:#004994">1.2</h3>
<p>Diese DGUV Information findet auf Lagereinrichtungen insoweit keine Anwendung, als im jeweiligen Landesbaurecht spezielle Regelungen enthalten sind.</p>
