<h2>Kann Schwei&szlig;rauch durch offene T&uuml;ren und Fenster ausreichend entfernt werden?</h2>

<h4>Nein, nur in Ausnahmef&auml;llen wird so wenig Schwei&szlig;rauch freigesetzt, dass die Schweißerin oder der Schwei&szlig;er bei nat&uuml;rlicher L&uuml;ftung (offene T&uuml;ren und Fenster) nicht gef&auml;hrdet ist.</h4>
