<h2>Welche Ger&auml;te sollten zum Absaugen von Schwei&szlig;rauchen eingesetzt werden?</h2>

<h4>Es d&uuml;rfen nur gepr&uuml;fte Ger&auml;te oder Ger&auml;te, deren Wirksamkeit im Einzelfall nachgewiesen wurde, eingesetzt werden.</h4>

<p>Die Liste der Hersteller mit gepr&uuml;ften Ger&auml;ten ist im Anhang beigef&uuml;gt.</p>
