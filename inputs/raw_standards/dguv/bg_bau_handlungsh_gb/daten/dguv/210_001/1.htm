<h2>1 Anwendungsbereich</h2>


<p>Diese DGUV Information behandelt die Beförderung von Flüssiggasflaschen, Druckgaspackungen und Kartuschen mit Flüssiggas auf der Straße und richtet sich an Unternehmerinnen oder Unternehmer sowie Versicherte von Betrieben, die diese Beförderungen durchführen.</p>
