<center>


<h4>&sect; 27<br>
Gewinnung mit Schrappern</h4>

</center>

<p>Bei der Gewinnung mit Schrappern d&uuml;rfen Versicherte die
Schrapperbahn nur bei Windenstillstand und nur dort betreten, wo
die anstehenden W&auml;nde auf 60&deg; (1:0,58) oder weniger
abgeb&ouml;scht sind.</p>
