<h2>1 Anwendungsbereich</h2>

<p>Dieser DGUV Grundsatz findet Anwendung auf Krane, die in den Geltungsbereich der <a href="../../dguv/52/titel.htm">DGUV Vorschrift 52</a> und 53 "Krane" fallen, einschließlich ihrer Tragkonstruktion und Ausrüstung.</p>
