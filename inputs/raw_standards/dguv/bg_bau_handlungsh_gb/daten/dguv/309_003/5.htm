<h3><a name="5">5. Befähigungsnachweis</a></h3>
<p>Über die bestandene Prüfung wird dem Kranführer ein Befähigungsnachweis ausgestellt; siehe <a href="anh2.htm">Anhang 2</a>.</p>
<p>Als Befähigungsnachweis gilt die schriftliche Bestätigung über das Erreichen des Unterweisungszieles unter Angabe der Kranarten, für die die Befähigung erworben worden ist. <script type="text/javascript" src="../../buttons2.js">
</script></p>
