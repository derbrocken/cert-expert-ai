<h2>2 Grundsätzliches</h2>

<p>Persönliche Absturzschutzausrüstungen sind entsprechend der Einsatzbedingungen und den betrieblichen Verhältnissen nach Bedarf, mindestens jedoch innerhalb von 12 Monaten auf ihren einwandfreien Zustand durch eine sachkundige Person zu prüfen.</p>
