<h2>4 Beauftragung</h2>

<p>Nach erfolgreich bestandener Prüfung und bedarfsgerechter Unterweisung entsprechend den Abschnitten <a href="3.htm#a34">3.4</a> und <a href="3.htm#a35">3.5</a> erfolgt die schriftliche Beauftragung des oder der Fachkundigen (Muster siehe <a href="anh3.htm">Anhang 3</a>).</p>
