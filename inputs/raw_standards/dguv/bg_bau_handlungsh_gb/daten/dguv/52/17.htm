<h4>&sect; 17<br>
H&ouml;chstgeschwindigkeit flurbedienter Krane</h4>

</center>

<br>
<p>Die Nennfahrgeschwindigkeit flurbedienter Krane, mit denen der
Kranf&uuml;hrer mitgehen muß, darf nicht mehr als 63 m/min.
betragen.</p>
