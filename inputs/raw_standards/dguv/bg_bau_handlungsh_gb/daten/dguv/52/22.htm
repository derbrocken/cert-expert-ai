<h4>&sect; 22<br>
Abspannseile</h4>

</center>

<br>
<p>An Standmasten von Kranen, die mit Seilen abgespannt sind,
m&uuml;ssen Zahl und Anordnung der Abspannseile so ausgelegt sein,
daß bei Bruch eines beliebigen Seiles der Mast nicht
umst&uuml;rzt.</p>
