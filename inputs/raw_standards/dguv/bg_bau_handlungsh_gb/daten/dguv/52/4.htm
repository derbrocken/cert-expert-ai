<h4>&sect; 4<br>
Fabrikschild</h4>

</center>

<br>
<p>An jedem Kran muß ein Fabrikschild mit folgenden Angaben angebracht sein:</p>
<ul class="strich">
<li>Hersteller oder Lieferer,</li>
<li>Baujahr,</li>
<li>Fabriknummer,</li>
<li>Typ, falls Typbezeichnung vorhanden,</li>
<li>Typpr&uuml;fungskennzeichen f&uuml;r typgepr&uuml;fte Krane.</li>
</ul>
