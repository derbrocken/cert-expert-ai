<center>


<h4>&sect; 34<br>
Anfahren von Notendhalteinrichtungen</h4>

</center>

<p>Der Ger&auml;tef&uuml;hrer darf Notendhalteinrichtungen nicht
betriebsm&auml;&szlig;ig anfahren. <b><a href="34.htm#d34">DA</a></b></p>

<p><a name="d34"></a></p>



<h4>DA zu <a href="34.htm">&sect; 34</a>:</h4>

<p>"Betriebsm&auml;&szlig;ig " bedeutet das beabsichtigte regelmäßige 
Anfahren der oberen Endstellung zur Ausnutzung der vollen
Hubh&ouml;he.</p>

<p>Siehe auch <a href="21.htm">&sect; 21</a>.</p>
