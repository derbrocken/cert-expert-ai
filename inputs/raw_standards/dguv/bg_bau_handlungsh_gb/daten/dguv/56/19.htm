<h4>B. Zus&auml;tzliche Bestimmungen f&uuml;r Pre&szlig;- und
Kerbger&auml;te</h4>

<h4>§ 19 Stellung des Z&uuml;ndbolzens</h4>

</div>

<p>Pre&szlig;- und Kerbger&auml;te d&uuml;rfen nur verwendet
werden, wenn federbelastete Z&uuml;ndbolzen so eingestellt sind,
da&szlig; ihre Spitze bei ungespanntem Ger&auml;t nicht &uuml;ber
den Sto&szlig;boden in das Kartuschenlager hineinragt.</p>
