<h4 align="center">§ 21 Z&uuml;nden</h4>

<p>Die Z&uuml;ndausl&ouml;sesicherung darf erst unmittelbar vor dem
Z&uuml;nden entsichert werden, nachdem der Kabelschuh oder der
Verbinder einschlie&szlig;lich des Leiters zwischen dem
R&uuml;ckenlager und dem Pre&szlig;bolzen eingelegt worden ist.</p>
