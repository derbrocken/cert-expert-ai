<h4>C. Zus&auml;tzliche Bestimmungen f&uuml;r
Viehschu&szlig;ger&auml;te</h4>


<h4>§ 22 Stellung des Z&uuml;ndbolzens</h4>


</div>

<p>Viehschu&szlig;ger&auml;te d&uuml;rfen nur verwendet werden,
wenn federbelastete Z&uuml;ndbolzen so eingestellt sind, da&szlig;
ihre Spitze bei ungespanntem Ger&auml;t nicht &uuml;ber den
Sto&szlig;boden in das Kartuschenlager hineinragt.</p>
