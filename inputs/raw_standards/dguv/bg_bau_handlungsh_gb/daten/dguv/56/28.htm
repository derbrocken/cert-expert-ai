<h4>F. Zus&auml;tzliche Bestimmungen f&uuml;r Industriekanonen</h4>

<h4>§ 28 Aufstellung</h4>
</div>

<p>Industriekanonen m&uuml;ssen mit ihrem Gestell standsicher und
so aufgestellt werden, da&szlig; Versicherte durch den
R&uuml;cksto&szlig; nicht gef&auml;hrdet werden k&ouml;nnen. Die
M&uuml;ndung der Kanone mu&szlig; unverr&uuml;ckbar auf das Ziel
ausgerichtet sein.</p>
