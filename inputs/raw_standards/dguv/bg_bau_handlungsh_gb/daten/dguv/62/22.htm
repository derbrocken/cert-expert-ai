<h2 align="center">
III. Betrieb</H2>
<H4 align="center">&#167; 22 Bedienung und Wartung</h4>


<P>
Der Unternehmer darf Maschinenanlagen nur von Personen bedienen
und warten lassen, die sachkundig sind und von denen zu erwarten
ist, da&szlig; sie ihre Aufgaben zuverl&auml;ssig erf&uuml;llen.
