<h4 align="center">&#167; 27 Durchdrehen (T&ouml;rnen) von Dieselmotoren</H4>


<P>
Kurbelwellen von Dieselmotoren mit Dekompressionseinrichtungen
d&uuml;rfen von Hand nur gedreht (get&ouml;rnt) werden, wenn die
Dekompressionseinrichtungen ge&ouml;ffnet sind.
