<h4 align="center">
&#167; 4 Aufstellung
</h4>

<P>
Maschinenanlagen m&uuml;ssen so eingerichtet und aufgestellt sein,
da&szlig; sie f&uuml;r die Bedienung und Wartung ausreichend zug&auml;nglich
sind und Personen, die sie bedienen oder warten, nicht gef&auml;hrdet
werden k&ouml;nnen.
