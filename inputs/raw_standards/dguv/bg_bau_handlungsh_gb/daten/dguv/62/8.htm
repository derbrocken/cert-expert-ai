<h4 align="center">
&#167; 8 Rohrleitungen
</h4>

<P>
Rohrleitungen und ihre Armaturen m&uuml;ssen entsprechend ihrem
Verwendungszweck dauerhaft gekennzeichnet sein. <B><A HREF="8.htm#d8">DA</A></B>
<P>
<BR>
<A NAME="d8"><!--$t$VBG 107b: Maschinenanlagen auf Wasserfahrzeugen und schwimmenden Ger&auml;ten, DA zu &#167; 8--$t$-->

<H4>DA zu <A HREF="8.htm">&#167; 8</A>:</H4>

<P>
Kennzeichnung z. B. durch Farbanstrich, beschriftete Schilder.
<P>
Siehe auch DIN 2403 &quot;Kennzeichnung von Rohrleitungen nach
dem Durchflu&szlig;stoff&quot;.
<P>
