<h4>&sect; 11<br>
Tragkonstruktion der Decks</h4>

</center>

<p>Die Tragkonstruktion der Decks und der Decksbelag m&uuml;ssen so
beschaffen sein, da&szlig; sie die auf sie wirkenden Belastungen
durch die Hebezeuge, F&ouml;rderger&auml;te, Arbeitsmaschinen oder
Arbeitsb&uuml;hnen aufnehmen.</p>
