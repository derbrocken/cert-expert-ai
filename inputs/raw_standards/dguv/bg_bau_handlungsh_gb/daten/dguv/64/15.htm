<h4>&sect; 15<br>
Fu&szlig;leisten, Wasserabl&auml;ufe</h4>

</center>

<p>Die Kanten der Decks m&uuml;ssen Fu&szlig;leisten haben, wenn
nicht Schanzkleider vorhanden sind. Wasserabl&auml;ufe m&uuml;ssen
in ausreichender Zahl vorhanden sein.</p>
