<h4>&sect; 23<br>
Sicherung gegen Verrutschen</h4>

</center>

<p>Hebezeuge, F&ouml;rderger&auml;te, Arbeitsmaschinen und
Arbeitsb&uuml;hnen, die nicht fest mit den Schwimmk&ouml;rpern
verbunden sind, m&uuml;ssen gegen Verrutschen gesichert werden.
Fahrbahnen m&uuml;ssen sicher begrenzt werden.</p>
