<h4>&sect; 26<br>
Arbeiten und Fahren bei Dunkelheit und Nebel</h4>

</center>

<p>Bei Dunkelheit und Nebel d&uuml;rfen schwimmende Ger&auml;te nur
betrieben oder verfahren werden, wenn der Arbeitsbereich oder das
Fahrwasser ausreichend erkennbar ist.</p>
