<h4>&sect; 27<br>
Abstellen von Gegenst&auml;nden</h4>

</center>

<p>Gegenst&auml;nde, z. B. Greifen, L&ouml;ffel, Lasten,
d&uuml;rfen nur so abgestellt werden, da&szlig; zwischen ihnen und
den &auml;u&szlig;ersten bewegten Teilen dreh- und fahrbarer
Hebezeuge, F&ouml;rderger&auml;te und Arbeitsmaschinen ein
Sicherheitsabstand von mindestens 500 mm vorhanden ist.</p>
