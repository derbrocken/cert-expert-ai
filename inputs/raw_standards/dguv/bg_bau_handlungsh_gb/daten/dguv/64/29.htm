<h4>&sect; 29<br>
Verstellen von Sch&uuml;ttklappen (Rutschen) und
F&ouml;rderb&auml;ndern</h4>

</center>

<p>H&ouml;henverstellbare Sch&uuml;ttklappen (Rutschen) und
F&ouml;rderb&auml;nder d&uuml;rfen nur durch mechanisch wirkende
Einrichtungen angehoben oder abgesenkt werden. Die
Auffangvorrichtungen sind wirksam zu machen.</p>
