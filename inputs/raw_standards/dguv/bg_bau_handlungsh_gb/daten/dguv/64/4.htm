<h4>&sect; 4<br>
Kennzeichnung</h4>

</center>

<p>An schwimmenden Ger&auml;ten m&uuml;ssen dauerhaft, gut lesbar
und zug&auml;nglich folgende Angaben f&uuml;r den
Schwimmk&ouml;rper (Schiffsk&ouml;rper) angebracht sein:</p>

<table style="margin-left:10%">
    <tr>
        <td>&ndash;</td>
        <td>Hersteller oder Lieferer</td>
    </tr>
    <tr>
        <td>&ndash;</td>
        <td>Baujahr</td>
    </tr>
    <tr>
        <td>&ndash;</td>
        <td>Baunummer.</td>
    </tr>
</table>
