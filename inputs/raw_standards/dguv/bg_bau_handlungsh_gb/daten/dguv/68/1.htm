<h2 align="center">I. Geltungsbereich</h2>

<h4 align="center">&#167; 1<br />
Geltungsbereich </h4>

<p>
    (1) Diese Unfallverh&uuml;tungsvorschrift gilt f&uuml;r Flurf&ouml;rderzeuge
einschlie&szlig;lich ihrer Anh&auml;nger.</p>
<p>
    (2) Diese Unfallverh&uuml;tungsvorschrift gilt nicht f&uuml;r
Flurf&ouml;rderzeuge mit durch Muskelkraft bewegtem Fahrwerk ohne
Hubeinrichtung.
</p>
