<h4 align="center">&#167; 31<br />
Abstandshaltung </h4>

<p>
Der Unternehmer darf in einem Schmalgang nur dann mehr als einen
Regal- oder Kommissionierstapler gleichzeitig einsetzen, wenn
durch selbstt&auml;tig wirkende Einrichtungen einem Zusammensto&szlig;en
der Ger&auml;te entgegengewirkt ist.
