<h4>&sect; 13<br />
Einrichtungen f&uuml;r Schallzeichen</h4>

</center>

<p>Maschinell angetriebene Fahrzeuge m&uuml;ssen mit Einrichtungen
f&uuml;r deutlich wahrnehmbare Schallzeichen ausger&uuml;stet sein.
<b><a href="13.htm#d13">DA</a></b></p>

<p><br />
<a name="d13"></a></p>



<h4><a name="d13">DA zu</a> <a href="13.htm">&sect; 13</a>:</h4>

<p>Einrichtungen f&uuml;r Schallzeichen sind z. B.</p>

<ul>
<li>Hupen,</li>

<li>H&ouml;rner.</li>
</ul>
