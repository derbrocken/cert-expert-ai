<h4>&sect; 48<br />
Verwendung von Beleuchtungseinrichtungen</h4>

</center>

<p>W&auml;hrend der D&auml;mmerung, bei Dunkelheit oder wenn die
Sichtverh&auml;ltnisse es sonst erfordern, hat der
Fahrzeugf&uuml;hrer die vorhandenen Beleuchtungseinrichtungen
bestimmungsgem&auml;&szlig; zu verwenden.</p>
