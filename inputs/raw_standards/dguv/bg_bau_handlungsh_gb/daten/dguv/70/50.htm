<center>


<h4>&sect; 50<br />
Warnzeichen</h4>

</center>

<p>Fahrzeugf&uuml;hrer m&uuml;ssen bei Gefahr Warnzeichen geben. 
<b><a href="50.htm#d50">DA</a></b></p>

<p><br />
<a name="d50"></a></p>



<h4><a name="d50">DA zu</a> <a href="50.htm">&sect; 50</a>:</h4>

<p>Warnzeichen k&ouml;nnen Schallzeichen mittels Einrichtungen nach
<a href="13.htm">&sect; 13</a> oder bei betrieblicher Notwendigkeit
optische Signale sein.</p>

<p><br />
