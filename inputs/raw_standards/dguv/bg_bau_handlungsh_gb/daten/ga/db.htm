<script language='javascript' src='../buttons.js'></script>

<form name="form">
<h2>Belastungen / Unterweisungen</h2>

<table style="background-color:#ECF1F7;width:100%" cellpadding="5" cellspacing="2">

<script type="text/javascript">

    var anz_ma=0;

	for (j=0;typeof parent.mitarbeiter_db['a'+(j+1)+'_1']!="undefined";j++) {
	    var name1=parent.mitarbeiter_db['a'+(j+1)+'_1'];
	    var pers_nr=parent.mitarbeiter_db['a'+(j+1)+'_2'];
	    var eh=parent.mitarbeiter_db['a'+(j+1)+'_3'];
	    var sachkunde=parent.mitarbeiter_db['a'+(j+1)+'_5'];
	    var sibe=parent.mitarbeiter_db['a'+(j+1)+'_6'];

	    dropdown_auswahl["b"+j+"3"]="Lärm|Asbesthaltiger Staub|Atemschutz|Benzol|Staub|Belastungen des Muskel- und Skelettsystems / Vibration|Gefahrstoffe|Strahlung|Klebstoffe|Schweiß- und Lötarbeiten";
	    //dropdown_auswahl["d"+j+"1"]="G 1.1 Silikogener Staub|G 1.2 Asbesthaltiger Staub|G 1.3 Keramikfaserhaltige Stäube|G 1.4 Staubbelastung|G 20 Lärm|G 24 Hautbelastungen|G 25 Fahr-, Steuer- und Überwachungstätigkeiten|G 26 Atemschutzgeräte|G 27 Isocyanate|G 29 Benzolhomologe (Toluol, Xylole)|G 30 Hitzearbeiten|G 37 Bildschirm-Arbeitsplätze|G 40 Krebserzeugende Gefahrstoffe - allgemein|G 41 Arbeiten mit Absturzgefahr|G 42 Infektionskrankheiten|G 44 Buchen- und Eichenholzstaub|G 46 Belastungen des Muskel-Skelett-Systems";
        document.write('<tr><td colspan="2"><b>'
          +name1
          +(pers_nr?' (Pers.-Nr. '+pers_nr+')':'')
          +'</b>'
          +(eh?', Ersthelfer':'')
          +(sibe?', Sicherheitsbeauftragter':'')
          +(sachkunde?', Sachkunde: '+sachkunde+' ':'')
          +'</td></tr>');
        document.write('<tr bgcolor="ffffff"><td style="border-right:5px solid #ECF1F7">');
        grid_anzeigen("b"+j, "Einsatzort#Zeitraum#Belastung", "120,130,148", "t,t,t");
        document.write('</td><td>');
        grid_anzeigen("c"+j, "Anlass der Unterweisung#am (Datum)", "180,90", "t,t");
        document.write('</td></tr>');
        document.write('<tr bgcolor="ffffff"><td colspan="2">');
        grid_anzeigen("d"+j, "Arbeitsmedizinische Vorsorge#durchgeführt (Datum)#Nachuntersuchungen (Datum)",  "350,140,160", "t,t,t");
        document.write('</td></tr>');
        anz_ma++;
        }
    document.write('</table>');
    if (anz_ma==0) document.write('<p>Bitte zunächst die Beschäftigten erfassen:</p>');
    document.write('<p><a href="mitarbeiter.htm">Beschäftigte erfassen</a></p>');
</script>

</form>
