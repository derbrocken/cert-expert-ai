           	       else {

           	       	    <a href="javascript:nachoben('+vorhandene_faktoren_nrn.length+')">&uArr;</a> <a href="javascript:nachunten('+vorhandene_faktoren_nrn.length+')">&dArr;</a>\

           	       	  vorhandene_faktoren_nrn.push(i);

function zurueck_zu_start()
{
   location.href=xpath+'ga/ga_'+bereich+'.htm';
}

function auswahl_bestaetigen()
{
   nicht_merk_flag=1;
   parent.eigene_struktur=hole_neue_auswahl(1);
   location.href=xpath+'ga/weitere_taetigk.htm?kap='+akt_nr;
}

function hole_neue_auswahl(flag_alert_ja_nein)
{
	var neue_faktoren='';
	var flag_ausgefuellt=0;
	var flag_faktor_schon_vorhanden=0;
    //alert(parent.eigene_struktur);
    var s=parent.eigene_struktur.split("\n");
   
    // erst die neuen Faktoren ermitteln
    //
	for(var i=0;i<document.form1.elements.length; i++) {
		var f=document.form1.elements[i];
		if (f.type=="checkbox" && f.checked && f.name.substring(0,4)=='erg_') { // Ergänzung aus Strukturdatei (mit Tab-Zeichen gekennzeichnete Zeilen sind 'ergänzende Faktoren')
            var nr=f.name.substring(4);
		    var neuerfaktor=struktur[nr]+'\n';
		    if (neuerfaktor.charAt(0)=='\t') {
		    	neuerfaktor=neuerfaktor.substring(1);
		        }
		    neue_faktoren+=neuerfaktor;
		    }
		if (f.type=="checkbox" && !f.checked && f.name.substring(0,7)=='loesch_') {
            var nr=f.name.substring(7);
             // Wenn man einen Faktor löscht, soll er in die Liste "Ergänzungen für.." verschoben werden, d.h. ein Tab-Zeichen muss davor.
             // Aber nur, wenn der Faktor noch nicht in dieser Liste ist.
             
             // zunächst prüfen, ob noch Eingaben in dem zu löschenden Formular vorhanden sind
             var form_id=s[nr].split("#")[0];
             flag_ausgefuellt+=pruefe_ob_ausgefuellt(form_id);
             
             // erst die ID ermitteln, die gelöscht werden soll. z.B. A01_3#.... -> dann ist A01 die ID.
             var id_die_geloescht_werden_soll=s[nr].split("#")[0].split("_")[0];
             var gefunden=0;
            
             // prüfen, ob dieser ID bereits in der Liste "Ergänzungen für..." ist
             //alert(id_die_geloescht_werden_soll + "--"+s);
             for(var j=0; j<s.length; j++) {
             	    if (s[j].charAt(0)=='\t') {
             	        var id=s[j].substring(1).split("#")[0];
    	                var id_ohne_lfdnr=id.split("_")[0];
    	                if (id_ohne_lfdnr==id_die_geloescht_werden_soll) {gefunden=1; j=s.length;}
    	                }
    	            }
            if (!gefunden) s[nr]="\t"+s[nr]; // das Formular verschieben zu "Ergänzungen für.."
            else s[nr]="XXX"; // Formular löschen
		    }
		}

	for(var i=0;i<document.form2.elements.length; i++) {
		var f=document.form2.elements[i];
		if (f.type=="checkbox" && f.checked && f.name.substring(0,5)=='erga_') { // Ergänzung aus allen Gewerken
            var nr=f.name.substring(5);
		    neue_faktoren+=struktur_a[nr]+'\n';
		    }
		}
   
    // bei den IDs der neuen Faktoren ggf. laufende Nummern ergänzen, damit keine doppelten IDs in der Struktur auftreten
    //
    // dazu zuerst die ID's der bereits vorhandenen Faktoren in ein Array schreiben.  z.B. A01, A02, B01
    // Wenn es bereits eigene Faktoren zu dieser ID gibt (A01_1, A01_2..., A02_1...)  dann die max. Nr. dieser Faktoren merken
    var id_vorhanden_maxnr=new Array();
    var faktorname_vorhanden=new Array();
    for(var i=0; i<s.length; i++) {
    	var id=s[i].split("#")[0];
    	var id_ohne_lfdnr=id.split("_")[0];
    	
    	var nr;
    	if (id.indexOf("_")==-1) nr=0; // z.B. A01 -> ist kein zusätzlicher Gef.Faktor -> Nr 0
    	else nr=parseInt(id.split("_")[1]); // Z.B. A01_10 -> d.h. die 10. Wiederholung des Faktors A01 -> Nr 10
    	
    	if (typeof id_vorhanden_maxnr[id_ohne_lfdnr]=="undefined") id_vorhanden_maxnr[id_ohne_lfdnr]=nr;
    	else if (nr>id_vorhanden_maxnr[id_ohne_lfdnr]) id_vorhanden_maxnr[id_ohne_lfdnr]=nr;
    	
    	try{
    		if (id.charAt(0)!="\t") {
    		 var faktorname=s[i].split("#")[4];
    	     faktorname_vorhanden[faktorname]=1;
    	     }
    	}catch(e){}
    }
    
    // jetzt die neuen Faktoren durchgehen
    if (neue_faktoren) {
        var nf=neue_faktoren.split("\n");
        for(var i=0; i<nf.length-1; i++) {
        	var id=nf[i].split("#")[0].split("_")[0];
        	if (typeof id_vorhanden_maxnr[id]!="undefined")  {
        	    nf[i]=id+"_"+(id_vorhanden_maxnr[id]+1)+nf[i].substring(nf[i].indexOf("#")); // id vorhanden-> eine neue lfd.nr. ergänzen!
        	    }
        	try{
        	   var faktorname=nf[i].split("#")[4];
        	   if (typeof faktorname_vorhanden[faktorname]!="undefined") flag_faktor_schon_vorhanden++;
            }catch(e){}
        }
        neue_faktoren=nf.join("\n");
    }
    
    //   
    //
   
   //alert(s[einfueg_pos]);
   s[einfueg_pos]='(X_y_Z)'+s[einfueg_pos];
   var str=s.join("\n");
   str=str.replace(/XXX\n/g, '');
   //alert(neue_faktoren);
   str=str.replace('(X_y_Z)', neue_faktoren);
   if (flag_faktor_schon_vorhanden) {
      if (!confirm('Hinweis: Einer oder mehrere dieser Faktoren sind bereits in der Struktur vorhanden. Soll die Änderung trotzdem gespeichert werden?')) return parent.eigene_struktur;
      }
   if (flag_ausgefuellt) {
      if (!confirm('Hinweis: In einem oder mehreren dieser Faktoren sind Eingaben gemacht worden. Sollen diese Faktoren trotzdem gelöscht werden? Die Eingaben bleiben erhalten.')) return parent.eigene_struktur;
      }
   return str;   
}

function such()
{
	location.href=xpath+'ga/weitere_taetigk.htm?kap='+akt_nr+'&such='+document.form_such1.faktor_such.value.replace(/[^äüöÄÜÖßA-Za-z0-9_ ]/g,"");
}

function nachunten(i)
{
   var s=parent.eigene_struktur.split("\n");
   var nr=vorhandene_faktoren_nrn[i];
   var nr1=vorhandene_faktoren_nrn[i+1];
   
   var merk=s[nr1]; s[nr1]=s[nr]; s[nr]=merk;
   parent.eigene_struktur=s.join("\n");
   location.href=xpath+'ga/weitere_taetigk.htm?kap='+akt_nr;
}

function nachoben(i)
{
   var s=parent.eigene_struktur.split("\n");
   var nr=vorhandene_faktoren_nrn[i];
   var nr1=vorhandene_faktoren_nrn[i-1];

   var merk=s[nr1]; s[nr1]=s[nr]; s[nr]=merk;
   parent.eigene_struktur=s.join("\n");
   location.href=xpath+'ga/weitere_taetigk.htm?kap='+akt_nr;
}

function name_aendern(i)
{
   var s=parent.eigene_struktur.split("\n");
   var f1=s[i].split("#");
   f1[3]=window.prompt("Name des Faktors:", f1[3]);
   if (!f1[3]) return;
   s[i]=f1.join("#");
   parent.eigene_struktur=s.join("\n");
   location.href=xpath+'ga/weitere_taetigk.htm?kap='+akt_nr;
}

function pruefe_ob_ausgefuellt(form_id)
{
	 var ga=parent.ga_daten["f"+form_id];
	 if (!ga) return 0; // nicht vorhanden, also auch nicht ausgefuellt
	 
   var g=ga.split("|");
   var dateiname=g[0];
   var checkboxen=new Array();
   if (g.length>1) checkboxen=g[1].split(","); else return 0;
   	
   for(var i=0; i<checkboxen.length; i++) if (checkboxen[i]==1) return 1; // es wurde eine gesetzte Checkbox gefunden
   for(var i=2; i<g.length; i++) if (g[i] && g[i]!="undefined") return 1; // es wurde ein gesetztes Eingabefeld gefunden
   return 0;   
}

function alle_erg_anzeigen()
{
document.getElementById('erg_alle').style.display='block';parent.weitere_taetigk_aufklapp=akt_nr;
document.getElementById('button_alle_anzeigen').style.display='none'
if (document.form_such1.faktor_such.value) { document.form_such1.faktor_such.value=''; such(); }

}
</script>
