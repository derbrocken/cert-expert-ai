<h3><font color=#0000a0>F&uuml;rsorgepflicht des Arbeitgebers</font></h3>
<p>


Zur F&uuml;rsorgepflicht des Arbeitgebers geh&ouml;rt es, alle erforderlichen Anordnungen und Ma&szlig;nahmen zu treffen sowie die erforderlichen Einrichtungen zu schaffen, die notwendig sind, Arbeitssicherheit und Gesundheitsschutz der Besch&auml;ftigten zu gew&auml;hrleisten.
