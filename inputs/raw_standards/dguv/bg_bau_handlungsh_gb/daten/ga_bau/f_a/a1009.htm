<h3><font color=#0000a0>Versinken</font></h3>


<p>Unabhängig von der Absturzhöhe sind Absturzsicherungen erforderlich an:</p>


<ul style="list-style-type:disc;">
<li>Arbeitspl&auml;tzen an oder &uuml;ber Wasser oder anderen
festen oder fl&uuml;ssigen Stoffen, in denen man versinken kann,</li>
<li>Verkehrswegen &uuml;ber Wasser oder anderen fl&uuml;ssigen
oder festen Stoffen, in denen man versinken kann.</li>
</ul>
