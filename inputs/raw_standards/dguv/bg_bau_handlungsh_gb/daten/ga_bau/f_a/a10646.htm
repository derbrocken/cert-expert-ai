<div id="text_r"><h3><font color=#a00000>Anseilschutz</font><br><font color=#000000>Falld&auml;mpfer</font></h3><p>Der Falld&auml;mpfer reduziert die Fallkr&auml;fte auf den K&ouml;rper auf maximal 4 kN und auf den Anschlagpunkt auf 6 kN.<p>Bei unged&auml;mpftem Fall<br><ul style="list-style-type:disc;"><li>aus 0,5 m H&ouml;he: 7,5-faches Eigengewicht<li>aus 1,0 m H&ouml;he: 12-faches Eigengewicht<li>aus 4,0 m H&ouml;he: 22-faches Eigengewicht</ul><p><div id="vd"><!-- --><p><!-- --></div><p></div><script type="text/javascript" src="../../buttons2.js"></script>
