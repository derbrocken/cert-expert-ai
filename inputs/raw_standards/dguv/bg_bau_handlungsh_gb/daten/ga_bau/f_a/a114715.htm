<h3><font color=#0000a0>Fangger&uuml;ste und Auffangnetze bei Tragger&uuml;sten und
Schalungen</font></h3>
<p>
Der H&ouml;henunterschied zwischen 
Arbeitsplatz und Ger&uuml;stbelag oder Auffangnetz
darf folgende Werte nicht &uuml;berschreiten:
<ul style="list-style-image:url('../logos/liste.gif')">

<li>Bei Fangger&uuml;sten nicht mehr als 2&nbsp;m </li>
<li>Bei Auffangnetze nicht mehr als 6&nbsp;m     </li>
</ul>
</p>
