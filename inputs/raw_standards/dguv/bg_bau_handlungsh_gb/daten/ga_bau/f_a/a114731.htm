<h3><font color=#0000a0>Tragger&uuml;ste und Schalungen - Begriff</font></h3>
<p>
Tragger&uuml;ste und Schalungen sind vor&uuml;bergehend errichtete
Baukonstruktionen, die der St&uuml;tzung von Bauteilen
in Beton- oder Stahlbetonbauweise dienen, bis diese ausreichende
Tragf&auml;higkeit erreicht haben.
