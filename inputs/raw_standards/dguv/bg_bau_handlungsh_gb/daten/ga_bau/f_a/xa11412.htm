<h3><font color=#0000a0>Fahrbare Ger&uuml;ste</font></h3>
<p>
Beim Einsatz von fahrbaren Ger&uuml;sten sind einige <a href="../f_a/a11414.htm">Hinweise</a>
zu beachten.
<p>
Beim <a href="../f_a/a1143.htm">Verfahren</a> und <a href="../f_a/a1144.htm">Arbeiten</a> sind zus&auml;tzlich
besondere Aspekte zu ber&uuml;cksichtigen.
<p>
Das fahrbare Gerüst ist vor Benutzung nach dem Plan für Aufbau, Benutzung und Abbau zu prüfen.
