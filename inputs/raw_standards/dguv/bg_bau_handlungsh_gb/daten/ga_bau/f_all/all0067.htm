<h3><font color=#0000a0>Einsatz von Schutzhelmen</font></h3>


<p>Beim Einsatz von Schutzhelmen ist u. a. folgendes zu beachten:</p>

<ul style="list-style-type:disc;">
<li>Die Schutzhelme m&uuml;ssen <a href="../../dguv/112_193/3_1_6.htm">gekennzeichnet</a> sein</li>
<li>Die Schutzhelme m&uuml;ssen <a href="../../dguv/112_193/3_1_3.htm">sachgerecht</a> eingesetzt werden</li>
<li>Die Beschäftigten sind zu <a href="../../dguv/112_193/3_3.htm">unterweisen</a></li>
<li>Die Schutzhelme sind in <a href="../../dguv/112_193/3_4_2.htm">ordnungsgem&auml;&szlig;en Zustand</a> zu halten.</li>
</ul>
