<h3><font color=#0000a0>Fußschutz für Arbeiten mit handgeführten Flüssigkeitsstrahlern</font></h3>
<p>Bei hohen Drücken (>250 bar) und kurzer Lanzenlänge (&lt;0,75 m) ist spezieller Fußschutz (I oder II) erforderlich oder es sind spezielle Gamaschen zu verwenden (Schutzbereich durchgehend vom Fußrücken bis zum Schienbein).</p>
