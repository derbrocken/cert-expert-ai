<h3><font color=#0000a0>Fu&szlig;platten und Spindeln</font></h3>

<p>
Fu&szlig;platten m&uuml;ssen immer vollfl&auml;chig
aufliegen (zum Beispiel durch schwenkbare Fu&szlig;spindeln oder
gesichertes Unterkeilen). 
<p>
Die Aufspindelung sollte am Anfang nur ca.
5-10 cm betragen, um eventuell noch etwas ausgleichen zu k&ouml;nnen.
