<h3><font color=#0000a0>Entl&uuml;ften <br>- Gas gefahrlos ableiten</font></h3>
<p>
Das Gas, das beim Entspannen der Leitung austritt, kann zum Beispiel
&uuml;ber Schlauchleitungen ins Freie geleitet werden. Den Schlauch
nicht in Nebenr&auml;ume legen, da dort eine gef&auml;hrliche
Gaskonzentration entstehen kann.
