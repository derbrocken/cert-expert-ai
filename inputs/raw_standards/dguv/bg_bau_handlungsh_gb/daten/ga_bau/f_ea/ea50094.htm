<h3><font color=#0000a0>Schutzkleinspannung</font></h3>

<p>Bei der Schutzkleinspannung wird ein Transformator eingesetzt, der die Spannung verringert. Der Transformator darf nicht geerdet sein. Die Steckvorrichtung hat keinen Schutzkontakt, und es ist auf die richtige Kennzeichnung zu achten:
<li>grau für 42 V   </li>
<li>lila für 24 V   </li>
</p>
