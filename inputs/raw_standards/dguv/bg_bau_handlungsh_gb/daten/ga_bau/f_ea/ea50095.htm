<h3><font color=#0000a0>Schutztrennung</font></h3>

<p>Bei der Schutztrennung wird ein Transformator eingesetzt, der
einen zweiten isolierten Stromkreis aufbaut. Der Sekund&auml;rstromkreis
darf nicht geerdet werden. Ortsver&auml;nderliche Trafos m&uuml;ssen
<a href="../f_ea/ea50093.htm">schutzisoliert</a> sein.</p>
