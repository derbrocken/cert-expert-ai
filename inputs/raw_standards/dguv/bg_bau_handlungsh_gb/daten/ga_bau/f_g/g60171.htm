<h3><font color=#0000a0>Asbesthaltige Produkte</font></h3>
<p>
<a href="../f_g/g6018.htm">Asbest ist ein krebserzeugender Gefahrstoff</a>.
<p>Es gibt zwei Arten von Asbestprodukten:<br>
<ul style="list-style-type:disc;">
<li><a href="../f_g/g6020.htm">Festgebundene Asbestprodukte</a> (Asbestzementprodukte)
<li><a href="../f_g/g6023.htm">schwach gebundene Asbestprodukte</a>.
</ul>
<p>
Bei T&auml;tigkeiten mit Asbest ist eine
<a href="../f_all/all0053.htm">arbeitsmedizinische Vorsorge</a>
vorgeschrieben.
