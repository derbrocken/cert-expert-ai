<h3><font color=#0000a0>Geeignete Beschäftigte bei Feuchtarbeiten</font></h3>
<p>

Nicht geeignet sind Beschäftigte mit anlagenbedingten Hauterkrankungen (z.B. Neurodermitis)
oder allergischen Hautekzemen. Auch Beschäftigte mit Wunden oder Pilzerkrankungen sind für
Feuchtarbeiten nicht geeignet.
