<h3><font color=#0000a0>PVC</font></h3>
<p>

Bei Bränden von PVC-haltigen Materialien muss, zumindest bei bestimmten Brandtemperaturen oder unter bestimmten
Brandbedingungen (z.B. Schwelbränden), mit der Entstehung von <a href="../f_g/g6107_3.htm">Dioxinen und Furanen</a> 
gerechnet werden. Diese Substanzen weisen besondere Gefährdungspotenziale auf.
