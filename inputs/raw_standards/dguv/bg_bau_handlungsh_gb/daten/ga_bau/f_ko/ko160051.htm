<table cellspacing="0" cellpadding="3" border="1" width=100%><tr><td width=99%><h3><center>
Gefahren f&uuml;r Mensch und Umwelt
</center></h3></td></tr></table><p>
Einatmen oder Verschlucken (Essen, Trinken oder Rauchen mit beschmutzten H&auml;nden) kann zu Gesundheits&shy;sch&auml;den f&uuml;hren. <br>
Vor&uuml;bergehende Beschwerden (Kopfschmerzen, Appetitlosigkeit, M&uuml;digkeit, Reizbarkeit, Hautverf&auml;rbung) m&ouml;glich. Kann Blutarmut, Darmkoliken, Anfallsleiden verursachen. <br>
Bleibende Gesundheitssch&auml;den m&ouml;glich (Nervenschaden). Blei kann das Kind im Mutterleib sch&auml;digen! Bleiverbindungen können die Fortpflanzungsf&auml;higkeit m&ouml;glicherweise beeintr&auml;chtigen!<br>

<table cellspacing="0" cellpadding="3" border="1" width=100%><tr><td width=99%><h3><center>Schutzma&szlig;nahmen und Verhaltensregeln</center></h3></td></tr></table><p>

<table width="100%">
<tr>
<td width=89%>
Arbeitsr&auml;ume, Betriebsanlagen, Maschinen und Ger&auml;te staubarm reinigen! Nicht fegen! Staubsauger der Staubklasse M (DIN EN 60335-2-69) verwenden.  Ber&uuml;hrung mit Augen und Haut vermeiden! <br>
Nach Arbeitsende und vor jeder Pause H&auml;nde und Gesicht gr&uuml;ndlich reinigen! Pers&ouml;nliche Schutzkleidung unmittelbar nach Verlassen des Arbeitsbereiches ablegen.<br>Nach Beendigung der Arbeit duschen! Verunreinigte Kleidung wechseln! Stra&szlig;enkleidung getrennt von Arbeitskleidung aufbewahren! Besch&auml;ftigungsbeschr&auml;nkungen beachten!</td>
<td width="10%"><img src="../bilder/handschu.gif"></td>
</tr>
</table>
<b>Handschutz: </b>Strahlerschutzhandschuhe <br>
<b>Atemschutz: </b>Strahlerhelm mit umgebungsluftunabh&auml;ngiger Luftversorgung.  <br>
<b>K&ouml;rperschutz: </b>Glatter, rei&szlig;fester, einteiliger Schutzanzug (Kombinationsanzug) in Verbindung mit Atemschutz. Zudem Schutzschuhe tragen.
