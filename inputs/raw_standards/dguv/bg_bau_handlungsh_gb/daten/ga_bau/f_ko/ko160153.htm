<h3><font color=#0000a0>Quarzarme Strahlmittel verwenden</font></h3>

<p>
In der Vergangenheit wurde h&auml;ufig <a href="../f_g/g60441.htm">Quarzsand</a> als
Strahlmittel verwendet. Dies f&uuml;hrte zu einer hohen Gef&auml;hrdung
der Besch&auml;ftigten (Silikose). Heute werden quarzfreie Strahl&shy;mittel
verwendet.
<p>
<b>Strahlen mit quarzhaltigen Strahlmitteln ist verboten</b>.
