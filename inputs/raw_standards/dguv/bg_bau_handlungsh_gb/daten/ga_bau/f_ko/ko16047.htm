<h3><font color=#0000a0>Düsenhalter mit Düse</font></h3>

<p>
Der Durchmesser der Strahldüse muss auf den Durchmesser des Strahlschlauches 
abgestimmt sein.
<br>
Bei der Verwendung zu kleiner Düsendurchmesser besteht die Gefahr von Verstopfungen 
oder Pulsationen.
</p>
