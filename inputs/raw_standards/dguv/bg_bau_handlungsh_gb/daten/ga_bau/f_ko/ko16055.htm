<h3><font color=#0000a0>Gehörschutz</font></h3>

<p>
muss der DIN EN 352 "Gehör&shy;schutz Sicherheits&shy;technische An&shy;for&shy;de&shy;run&shy;gen" entsprechen.
Gerade bei Strahl&shy;arbeiten kann die Lärm&shy;exposition,
je nach Verfahren, besonders hoch sein (bis zu 117dB (A)). Aufgrund dieser Tatsache ist das Tragen
von Gehör&shy;schutz Pflicht.
