<h3><font color=#0000a0>Schlaufen&shy;methode</font></h3>

<p>

für das Sicherungs&shy;seil geschaffen. Bauliche Maßnahmen an der Mast&shy;konstruktion sind 
nicht erforderlich. Die Schlaufen&shy;methode ist generell für alle Stahl&shy;gitter&shy;maste geeignet.
