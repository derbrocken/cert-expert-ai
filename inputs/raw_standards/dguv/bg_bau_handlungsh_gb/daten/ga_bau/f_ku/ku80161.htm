<h3><font color=#0000a0>Kranf&uuml;hrer-Anforderungen </font></h3>
<p>
Kranf&uuml;hrer haben folgende Anforderungen zu erf&uuml;llen:


<ul style="list-style-type:disc;">
<li>mindestens 18 Jahre alt,</li>
<li>k&ouml;rperlich und geistig geeignet,</li>
<li><a href="../f_g/g60294.htm">unterwiesen</a> in der sicheren und sachgerechten
Bedienung,</li>
<li>zuverl&auml;ssig,</li>
<li>vom Arbeitgeber bestimmt und <a href="../f_ku/ku801622.htm">schriftlich beauftragt</a></li>
</ul>
