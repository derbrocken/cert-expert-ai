<h3><font color=#0000a0>Feierabendstellung</font></h3>



<p>Der Kran ist nach den Vorgaben des Herstellers in Feierabendstellung zu bringen:</p>

<ul>
	<li>keine Last am Kranhaken</li>
	<li>Ausleger in weitester Ausladung</li>
	<li>Haken hochziehen</li>
	<li>Drehwerkbremse lösen</li>
	<li>Fahrwerksicherung einlegen</li>
	<li>Steuereinrichtung in Nullstellung</li>
</ul>
