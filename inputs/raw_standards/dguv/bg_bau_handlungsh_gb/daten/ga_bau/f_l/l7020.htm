<h3><font color=#0000a0>L&auml;rmminderung</font></h3>
<p>
Bei Ma&szlig;nahmen zur Minderung des L&auml;rms haben
<a href="../f_l/l7021.htm">technische Ma&szlig;nahmen</a>
vor
<a href="../f_l/l7022.htm">organisatorischen Ma&szlig;nahmen</a>
Vorrang. 

Erst wenn keine dieser Ma&szlig;nahmen greift und der <a href="../f_l/l7008.htm">Tages-Lärmexpositionspegels</a> bei &ge; 80 dB(A) liegt, sind

<a href="../f_l/l7023.htm">pers&ouml;nliche Schutzma&szlig;nahmen</a>
einzuleiten.
