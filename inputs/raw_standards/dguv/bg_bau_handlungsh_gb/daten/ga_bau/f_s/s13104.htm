<h3><font color=#0000a0>Gesundheitsgefahren</font></h3>
<p>Gesundheitsgefahren f&uuml;r den menschlichen K&ouml;rper k&ouml;nnen
zum einen durch <a href="../f_s/s131041.htm"><u>mittelbare Einwirkungen</u></a> entstehen.</p>

<p>Nachgewiesen sind dar&uuml;ber hinaus unmittelbare Einwirkungen in
Form von <a href="../f_s/s131043.htm"><u>thermischen
Effekten</u></a> auf den menschlichen Organismus.</p>
