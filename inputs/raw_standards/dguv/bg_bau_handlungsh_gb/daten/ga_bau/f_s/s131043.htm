<h3><font color=#0000a0>Thermische Effekte</font></h3>

<p>Durch thermische Effekte sind folgende Bereiche des menschlichen
Organismus gef&auml;hrdet:</p>

<ul style="list-style-type:disc;">
<li>das Gehirn,</li>
<li>die m&auml;nnlichen Keimdr&uuml;sen,</li>
<li>Gelenke (insbesondere die Kniegelenke)</li>
<li style="list-style-type:none;">und</li>
<li><a href="../f_s/s131044.htm">das Auge</a></li>
</ul>
