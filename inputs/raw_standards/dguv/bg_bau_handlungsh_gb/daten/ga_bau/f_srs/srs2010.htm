<h3><font color=#0000a0>St&ouml;rung des Gleichgewichts im Boden</font></h3>
<p>
Eine Grube oder ein Graben st&ouml;rt das Gleichgewicht des Bodens.
Der Erdruck muss umverteilt werden:
<ul style="list-style-image:url('../logos/liste.gif')">
<li>durch abgeb&ouml;schten (dreieckigen) Aushub,
<li>durch Verbau (rechteckig durch Erddruckumlagerung).
</ul>
