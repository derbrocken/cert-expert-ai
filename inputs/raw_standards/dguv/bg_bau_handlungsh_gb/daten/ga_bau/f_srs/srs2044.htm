<h3><font color=#0000a0>Sichere &Uuml;berg&auml;nge</font></h3>
<p>
Gr&auml;ben mit mehr als 0,8 m Breite sind mit Laufbr&uuml;cken
oder Laufstegen (b &gt; 0,5 m) zu versehen. 
<p>
Bei mehr als 1 m Grabentiefe sind die &Uuml;berg&auml;nge beidseitig mit dreiteiligem Seitenschutz zu versehen.<p>
