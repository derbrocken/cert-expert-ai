<h3><font color=#0000a0>Bohrmaschine und Bohrhammer</font></h3>
<p>
Neben <a href="../f_ubm/ubm40061.htm">allgemeinen Schutzma&szlig;nahmen</a> ist beim
Umgang mit Bohrmaschinen und Bohrh&auml;mmern unter anderem zu beachten:
<ul style="list-style-type:disc;">
<li>Langes Haar sch&uuml;tzen (z. B. Haarnetz).
<li>K&ouml;nnen Sp&auml;ne oder Splitter entstehen, <a href="../f_all/all0073.htm">Schutzbrille</a>
tragen.
<li><a href="../f_l/l7023.htm">Geh&ouml;rschutz</a> verwenden.
</ul>
