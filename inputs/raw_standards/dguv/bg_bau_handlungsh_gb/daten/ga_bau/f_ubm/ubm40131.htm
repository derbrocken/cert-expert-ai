<h3><font color=#0000a0>Metalls&auml;ge</font></h3>
<p>
Neben <a href="../f_ubm/ubm40061.htm">allgemeinen Schutzma&szlig;nahmen</a> ist beim
Umgang mit Metalls&auml;gen unter anderem zu beachten:
<ul style="list-style-type:disc;">
<li>S&auml;gebl&auml;tter bis auf den zum S&auml;gen ben&ouml;tigten
Teil verkleiden.
<li>Niemals Handschuhe tragen.
<li>Beim S&auml;gen in Augenh&ouml;he
<a href="../f_all/all0073.htm">Schutzbrille</a>
benutzen
<li><a href="../f_l/l7023.htm">Geh&ouml;rschutz</a>
verwenden
</ul>
