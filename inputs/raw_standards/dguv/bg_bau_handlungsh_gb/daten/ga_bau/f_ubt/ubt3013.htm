<h3><font color=#0000a0>Schutznetze</font></h3>
<p>
Schutznetze haben die Funktion, Personen beim <a href="../f_a/a10061.htm">Absturz</a>
und herabfallende Gegenst&auml;nde aufzufangen. Schutznetze, die
herabfallende Gegenst&auml;nde auffangen sollen, d&uuml;rfen eine
Maschenweite von h&ouml;chstens 2 cm besitzen.
