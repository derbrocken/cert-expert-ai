<p>
Rundschlingen / Chemiefaserb&auml;nder sind abzulegen bei 
<ul style="list-style-type:disc;">

<li>Verformung durch W&auml;rmeeinfluss (z.&nbsp;B. Reibung,
Strahlung);
<li>Sch&auml;den durch das Einwirken aggressiver Stoffe.
