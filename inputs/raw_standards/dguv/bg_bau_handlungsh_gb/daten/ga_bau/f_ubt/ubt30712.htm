<h3><font color=#0000a0>G&uuml;teklassen</font></h3>
<p>
Die G&uuml;teklasse sagt etwas &uuml;ber die G&uuml;te der Kette
aus: 
<ul style="list-style-type:disc;">
<li>G&uuml;teklasse 2 = Normalg&uuml;te (DIN&nbsp;766, DIN&nbsp;695);
<li>G&uuml;teklasse 3 = verg&uuml;tete Kette (DIN&nbsp;766, DIN&nbsp;695);
<li>G&uuml;teklasse 5, 6, 8 = hochfeste Ketten (DIN&nbsp;5688 Teil&nbsp;1, 2 und&nbsp;3). 
</ul>
