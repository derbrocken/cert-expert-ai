<h3><font color=#0000a0>Regelungen zur Ladungssicherung</font></h3>
<p>
Die umfangreichen Regelungen zur <a href="../../bausteine/a_070/a_070.htm">Ladungssicherung</a> sind hier nicht aufgenommen.
<p>
Zu beachten sind immer die Bestimmungen in der Stra&szlig;enverkehrs-Ordnung.
<p>
Beim <a href="../../bausteine/a_069/a_069.htm">Transport von Baumaschinen</a> ist eine besondere Aufmerksamkeit auf die hohen Gewichte der Maschinen zu legen.
