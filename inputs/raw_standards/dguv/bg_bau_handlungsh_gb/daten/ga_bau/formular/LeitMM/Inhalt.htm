<h3><img src="..\..\grafik\kud.gif"> Die Leitmerkmalmethode</h3>

Die Leitmerkmalmethode (LMM) ist ein Beurteilungsverfahren zur Ermittlung der vorhandenen physischen Arbeitsbelastung. Es gibt Leitmerkmalmethoden für die Belastungsarten
<ul>
  <li><a target="_blank" href="https://www.baua.de/DE/Angebote/Publikationen/Praxis/A7.html">Heben, Halten und Tragen von Lasten</a></li>
   <li><a target="_blank" href="https://www.baua.de/DE/Themen/Arbeitsgestaltung/Gefaehrdungsbeurteilung/Leitmerkmalmethode/pdf/LMM-Ziehen-Schieben.html">Ziehen und Schieben von Lasten</a></li>
 <!-- <li><a href="https://www.baua.de/DE/Themen/Arbeitsgestaltung-im-Betrieb/Physische-Belastung/Leitmerkmalmethode/pdf/LMM-Manuelle-Arbeit-2.pdf">manuelle Arbeitsprozesse </a></li>  -->
</ul>





<!--<H4>Vereinfachtes Verfahren zur Beurteilung von Arbeitsbedingungen</H4>
Die Beurteilung erfolgt grundsätzlich für Teiltätigkeiten und ist auf
einen Arbeitstag zu beziehen</B>. Wechseln innerhalb einer Teiltätigkeit
Lastgewichte und/oder Körperhaltungen, so sind Mittelwerte zu bilden. Treten
innerhalb einer Gesamttätigkeit mehrere Teiltätigkeiten mit deutlich
unterschiedlichen Lastenhandhabungen auf, sind diese getrennt
einzuschätzen und zu dokumentieren. </P>
<P>Zur Beurteilung sind 3 Schritte erforderlich: </P>
<OL>
<LI>Bestimmung der <a href="1.htm">Zeitwichtung</A>,</li>
<LI>Bestimmung der <a href="2.htm">Wichtung der Leitmerkmale</A> und</li>
<LI><a href="3.htm">Bewertung</A>.</LI></OL>
<P>Bei der Bestimmung der Wichtungen ist grundsätzlich die Bildung von
Zwischenstufen erlaubt. Eine Häufigkeit von 40 ergibt z. B. die
Zeitwichtung 3. Einzige Ausnahme ist die wirksame Last von <U>&gt;</U> 40 kg für
den Mann und <U>&gt;</U> 25 kg für die Frau. Diese Lasten ergeben kompromisslos
eine Lastwichtung von 25.</P>
