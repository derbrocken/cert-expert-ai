<h4 class="center">§ 4<br />
Anforderungen an Betriebsärzte</h4>

<p>Der Arbeitgeber darf als Betriebsärzte nur Personen bestellen, die berechtigt sind, den ärztlichen Beruf auszuüben, und die über die zur Erfüllung der ihnen übertragenen Aufgaben erforderliche arbeitsmedizinische Fachkunde verfügen.</p>
