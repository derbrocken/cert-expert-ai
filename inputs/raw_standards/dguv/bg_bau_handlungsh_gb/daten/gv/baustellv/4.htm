<h4 class="center">§ 4<br />
Beauftragung<br /></h4>

<p>Die Maßnahmen nach <a href="2.htm">§ 2</a> und <a href="3.htm">§ 3</a> Abs. 1 Satz 1 hat der Bauherr zu treffen, es sei denn, er beauftragt einen Dritten, diese Maßnahmen in eigener Verantwortung zu treffen.</p>
