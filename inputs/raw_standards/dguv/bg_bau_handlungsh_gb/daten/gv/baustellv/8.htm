<h4 class="center">§ 8<br />
Inkrafttreten und Übergangsvorschrift</h4>

<p class="abs">(1) Diese Verordnung tritt am ersten Tage des auf die Verkündung folgenden Kalendermonats in Kraft.</p>

<p class="abs">(2) Für Bauvorhaben, mit deren Ausführung bereits vor dem 1. April 2023 begonnen worden ist, bleiben die bisherigen Vorschriften maßgebend.</p>
