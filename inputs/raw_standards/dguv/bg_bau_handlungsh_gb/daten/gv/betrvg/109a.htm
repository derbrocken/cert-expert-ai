<h4 class="center">§ 109a<br />
Unternehmensübernahme</h4>

<p>In Unternehmen, in denen kein Wirtschaftsausschuss
besteht, ist im Fall des <a href="106.htm">§ 106 Abs. 3 Nr. 9a</a>
der Betriebsrat entsprechend <a href="106.htm">§ 106 Abs. 1 und 2</a> zu
beteiligen; <a href="109.htm">§ 109</a> gilt entsprechend.</p>
