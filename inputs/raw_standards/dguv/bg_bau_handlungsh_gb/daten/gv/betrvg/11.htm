<h4 class="center">§ 11<br />
Ermäßigte Zahl der Betriebsratsmitglieder</h4>

<p>Hat ein Betrieb nicht die ausreichende Zahl von wählbaren Arbeitnehmern, so ist die Zahl der Betriebsratsmitglieder der nächstniedrigeren Betriebsgröße zugrunde zu legen.</p>
