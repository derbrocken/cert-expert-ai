<h4 class="center">§ 127<br />
Verweisungen</h4>

<p>Soweit in anderen Vorschriften auf Vorschriften verwiesen wird oder Bezeichnungen verwendet werden, die durch dieses Gesetz aufgehoben oder geändert werden, treten an ihre Stelle die entsprechenden Vorschriften oder Bezeichnungen dieses Gesetzes.</p>
