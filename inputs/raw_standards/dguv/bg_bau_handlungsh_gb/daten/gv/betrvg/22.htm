<h4 class="center">§ 22<br />
Weiterführung der Geschäfte des Betriebsrats</h4>
<p>In den Fällen des <a href="13.htm">§ 13 Abs. 2 Nr. 1 bis 3</a> führt der Betriebsrat die Geschäfte weiter, bis der neue Betriebsrat gewählt und das Wahlergebnis bekannt gegeben ist.</p>
