<h4 class="center">§ 52<br />
Teilnahme der Gesamtschwerbehindertenvertretung</h4>

<p>Die Gesamtschwerbehindertenvertretung (§ 180 Absatz 1 des Neunten Buches Sozialgesetzbuch) kann an allen Sitzungen des Gesamtbetriebsrats beratend teilnehmen.</p>
