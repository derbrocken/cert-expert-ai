<h4 class="center">§ 68<br />
Teilnahme an gemeinsamen Besprechungen</h4>

<p>Der Betriebsrat hat die Jugend- und Auszubildendenvertretung zu Besprechungen zwischen Arbeitgeber und Betriebsrat beizuziehen, wenn Angelegenheiten behandelt werden, die besonders die in <a href="60.htm">§ 60 Abs. 1</a> genannten Arbeitnehmer betreffen.</p>
