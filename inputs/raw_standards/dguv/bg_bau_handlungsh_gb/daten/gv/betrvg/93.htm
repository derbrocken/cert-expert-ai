<h4 class="center">§ 93<br />
Ausschreibung von Arbeitsplätzen</h4>

<p>Der Betriebsrat kann verlangen, dass Arbeitsplätze, die besetzt werden sollen, allgemein oder für bestimmte Arten von Tätigkeiten vor ihrer Besetzung innerhalb des Betriebs ausgeschrieben werden.</p>
