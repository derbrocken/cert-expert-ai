<h4 class="center">§ 12<br />Arbeitsmedizinische Vorsorge</h4>

<p>Die Verordnung zur arbeitsmedizinischen Vorsorge in der jeweils geltenden Fassung gilt auch für den in <a href="2.htm">§ 2 Absatz 9 Satz 2</a> genannten Personenkreis.</p>
