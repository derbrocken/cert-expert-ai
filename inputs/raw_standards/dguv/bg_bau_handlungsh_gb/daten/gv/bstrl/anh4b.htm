<center>


<h4>Besondere Mindestvorschriften f&uuml;r Arbeitspl&auml;tze auf
Baustellen</h4>

</center>

<p><b>Vorbemerkung</b></p>

<p>Wenn besondere Situationen es erfordern, ist die Einteilung der
Mindestanforderungen in zwei Abschnitte, wie sie nachstehend
aufgef&uuml;hrt sind, als solche nicht als verbindlich
anzusehen.</p>
