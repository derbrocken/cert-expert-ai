<h4 class="center">§ 1<br />
Geltungsbereich</h4>

<p class="abs">(1) Diese Verordnung gilt für Arbeiten in Druckluft, soweit diese von einem Arbeitgeber gewerbsmäßig ausgeführt werden.</p>

<p class="abs">(2) Diese Verordnung gilt nicht für Arbeiten in Taucherglocken ohne Schleusen und für Taucherarbeiten.</p>
