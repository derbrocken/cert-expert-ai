<h4 class="center">§ 13<br />
Ermächtigte Ärzte</h4>

<p>Ärzte, die nach dieser Verordnung tätig werden, müssen die erforderliche arbeitsmedizinische Fachkunde sowie Fachkenntnisse bezüglich der Arbeiten in Druckluft besitzen und von der zuständigen Behörde ermächtigt sein.</p>
