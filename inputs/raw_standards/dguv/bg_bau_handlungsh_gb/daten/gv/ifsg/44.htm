<h2 class="center">9.&nbsp;Abschnitt<br />Tätigkeiten mit Krankheitserregern</h2>

<h4 class="center">§&nbsp;44<br />
Erlaubnispflicht für Tätigkeiten mit Krankheitserregern</h4>

<p>Wer Krankheitserreger in den Geltungsbereich dieses Gesetzes verbringen, sie ausführen, aufbewahren, abgeben oder mit ihnen arbeiten will, bedarf einer Erlaubnis der zuständigen Behörde.</p>
