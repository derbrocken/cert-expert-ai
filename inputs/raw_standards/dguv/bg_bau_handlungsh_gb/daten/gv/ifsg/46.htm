<h4 class="center">§&nbsp;46<br />
Tätigkeit unter Aufsicht</h4>

<p>Der Erlaubnis nach §&nbsp;44 bedarf nicht, wer unter Aufsicht desjenigen, der eine Erlaubnis besitzt oder nach §&nbsp;45 keiner Erlaubnis bedarf, tätig ist.</p>
