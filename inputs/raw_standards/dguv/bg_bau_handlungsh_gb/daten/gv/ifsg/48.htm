<h4 class="center">§&nbsp;48<br />
Rücknahme und Widerruf</h4>

<p>Die Erlaubnis nach §&nbsp;44 kann außer nach den Vorschriften des Verwaltungsverfahrensgesetzes zurückgenommen oder widerrufen werden, wenn ein Versagungsgrund nach §&nbsp;47 Abs.&nbsp;1 vorliegt.</p>
