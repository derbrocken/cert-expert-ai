<h4 class="center">§&nbsp;67<br />
Pfändung</h4>

<p>Die nach §&nbsp;56 Abs.&nbsp;2 Satz&nbsp;2 und 3 zu zahlenden Entschädigungen können nach den für das Arbeitseinkommen geltenden Vorschriften der Zivilprozessordnung gepfändet werden.</p>
