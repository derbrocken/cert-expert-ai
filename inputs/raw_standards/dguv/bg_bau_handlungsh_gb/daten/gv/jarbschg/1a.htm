<h4 class="center">§ 1a<br />
Formvorgaben</h4>

<p class="abs">Soweit in diesem Gesetz schriftliche Handlungen vorgesehen sind, können diese auch in Textform erfolgen. Dies gilt nicht für <a href="6.htm">§ 6 Absatz 4 Satz 1</a> und <a href="21a.htm">§ 21a Absatz 2</a>.</p>
