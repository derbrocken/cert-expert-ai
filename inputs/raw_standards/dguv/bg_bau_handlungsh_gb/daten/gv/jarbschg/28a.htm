<h4 class="center">§ 28 a<br />
Beurteilung der Arbeitsbedingungen</h4>

<p>Vor Beginn der Beschäftigung Jugendlicher und bei wesentlicher Änderung der Arbeitsbedingungen hat der Arbeitgeber die mit der Beschäftigung verbundenen Gefährdungen Jugendlicher zu beurteilen. Im übrigen gelten die Vorschriften des Arbeitsschutzgesetzes.</p>
