Schlußvorschriften</h2>

<h4 class="center">§ 61<br />
Beschäftigung von Jugendlichen auf Kauffahrteischiffen</h4>

<p>Für die Beschäftigung von Jugendlichen als Besatzungsmitglieder auf Kauffahrteischiffen im Sinne des § 3 des Seearbeitsgesetzes gilt anstelle dieses Gesetzes das Seearbeitsgesetz.</p>
