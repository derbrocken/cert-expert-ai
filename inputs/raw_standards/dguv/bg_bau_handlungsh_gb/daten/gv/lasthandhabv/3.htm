<h4 class="center">§ 3<br />
Übertragung von Aufgaben</h4>

<p>Bei der Übertragung von Aufgaben der manuellen Handhabung von Lasten, die für die Beschäftigten zu einer Gefährdung für Sicherheit und Gesundheit führen, hat der Arbeitgeber die körperliche Eignung der Beschäftigten zur Ausführung der Aufgaben zu berücksichtigen.</p>
