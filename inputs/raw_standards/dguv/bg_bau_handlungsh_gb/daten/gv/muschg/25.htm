<h4 class="center">§ 25<br />
Beschäftigung nach dem Ende des Beschäftigungsverbots</h4>

<p class="abs">Mit dem Ende eines Beschäftigungsverbots im Sinne von <a href="2.htm">§ 2</a> Absatz 3 hat eine Frau das Recht, entsprechend den vertraglich vereinbarten Bedingungen beschäftigt zu werden.</p>
