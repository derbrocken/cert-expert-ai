<h4 class="center">§ 33<br />
Strafvorschriften</h4>

<p class="abs">Wer eine in <a href="32.htm">§ 32</a> Absatz 1 Nummer 1 bis 5, 8, 16 und 17 bezeichnete vorsätzliche Handlung begeht und dadurch die Gesundheit der Frau oder ihres Kindes gefährdet, wird mit Freiheitsstrafe bis zu einem Jahr oder mit Geldstrafe bestraft.</p>
