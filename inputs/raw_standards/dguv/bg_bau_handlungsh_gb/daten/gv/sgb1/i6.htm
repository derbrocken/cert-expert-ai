<h4 class="center">§ 6<br />
Minderung des Familienaufwands</h4>

<p>Wer Kindern Unterhalt zu leisten hat oder leistet, hat ein Recht auf Minderung der dadurch entstehenden wirtschaftlichen Belastungen.</p>
