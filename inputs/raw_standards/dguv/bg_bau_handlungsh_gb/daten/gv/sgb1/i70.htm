<h4 class="center">§ 70<br />
Überleitungsvorschrift zum Verjährungsrecht</h4>
<p>Artikel 229 § 6 Abs. 1 und 2 des Einführungsgesetzes zum Bürgerlichen Gesetzbuche gilt entsprechend bei der Anwendung des <a href="i45.htm">§ 45</a> Abs. 2 und 3 in der seit dem 1. Januar 2002 geltenden Fassung.</p>
