<h4 class="center">§ 10<br />
Beteiligungsfähigkeit</h4>
<p>Fähig, am Verfahren beteiligt zu sein, sind</p>
<table>
<tr valign="top">
<td>1.</td>
<td>natürliche und juristische Personen,</td>
</tr>
<tr valign="top">
<td>2.</td>
<td>Vereinigungen, soweit ihnen ein Recht zustehen kann,</td>
</tr>
<tr valign="top">
<td>3.</td>
<td>Behörden.</td>
</tr>
</table>
