<h4 class="center">§ 114<br />
Rechtsweg</h4>
<table>
<tr valign="top">
<td>
<p>Für den Erstattungsanspruch ist derselbe Rechtsweg wie für den Anspruch auf die Sozialleistung gegeben. Maßgebend ist im Fall des § 102 der Anspruch gegen den vorleistenden Leistungsträger und im Fall der §§ 103 bis 105 der Anspruch gegen den erstattungspflichtigen Leistungsträger.</p>
</td>
</tr>
</table>
