<h4 class="center">§ 118<br />
Bindung der Gerichte</h4>
<table>
<tr valign="top">
<td>
<p>Hat ein Gericht über einen nach § 116 übergegangenen Anspruch zu entscheiden, ist es an eine unanfechtbare Entscheidung gebunden, dass und in welchem Umfang der Leistungsträger zur Leistung verpflichtet ist.</p>
</td>
