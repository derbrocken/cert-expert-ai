<h4 class="center">§ 5<br />
Auswahl der Behörde</h4>
<p>Kommen für die Amtshilfe mehrere Behörden in Betracht, soll nach Möglichkeit eine Behörde der untersten Verwaltungsstufe des Verwaltungszweiges ersucht werden, dem die ersuchende Behörde angehört.</p>
