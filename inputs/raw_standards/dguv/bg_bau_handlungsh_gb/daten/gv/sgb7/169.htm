<h4 class="center">§ 169<br />
Erhebung von Säumniszuschlägen</h4>

<p class="abs">Ein Säumniszuschlag nach § 24 Absatz 1 Satz 1 des Vierten Buches ist nicht zu erheben, wenn</p>

<ol>
<li>dieser einen Betrag von 5 Euro unterschreitet oder</li>
<li>ein Säumnis bis zu drei Tagen vorliegt.</li>
</ol>

<p>Dies gilt nicht für die landwirtschaftliche Unfallversicherung.</p>
