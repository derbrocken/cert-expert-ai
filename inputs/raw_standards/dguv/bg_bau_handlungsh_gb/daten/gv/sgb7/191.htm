<h3 class="center">Zweiter Abschnitt<br />
Beziehungen der Unfallversicherungsträger zu Dritten</h3>

<h4 class="center">§&nbsp;191<br />
Unterstützungspflicht der Unternehmer</h4>

<p>Die Unternehmer haben die für ihre Unternehmen zuständigen Unfallversicherungsträger bei der Durchführung der Unfallversicherung zu unterstützen; das Nähere regelt die Satzung.</p>
