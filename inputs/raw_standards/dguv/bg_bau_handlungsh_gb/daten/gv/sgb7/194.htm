<h4 class="center">§ 194<br />
Meldepflicht der Eigentümer von Seeschiffen</h4>
<p>Die Seeschiffe, die unter der Bundesflagge in Dienst gestellt werden sollen, haben die Eigentümer bereits nach ihrem Erwerb oder bei Beginn ihres Baus der Berufsgenossenschaft Verkehrswirtschaft Post-Logistik Telekommunikation zu melden.</p>
