<h4 class="center">§ 218b<br />
Rückwirkende Anerkennung von Berufskrankheiten</h4>

<p class="abs">Für die rückwirkende Anerkennung von Berufskrankheiten, die vor dem 1. Januar 2021 in der Verordnung nach § 9 Absatz 1 bezeichnet worden sind, gilt § 6 der Verordnung in der am 1. Januar 2021 geltenden Fassung.</p>
