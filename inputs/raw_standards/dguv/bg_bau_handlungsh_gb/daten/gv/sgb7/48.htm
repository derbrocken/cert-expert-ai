<h4 class="center">§ 48<br />
Verletztengeld bei Wiedererkrankung</h4>
<p>Im Fall der Wiedererkrankung an den Folgen des Versicherungsfalls gelten die §§&nbsp;45 bis 47 mit der Maßgabe entsprechend, daß anstelle des Zeitpunkts der ersten Arbeitsunfähigkeit auf den der Wiedererkrankung abgestellt wird.</p>
