<h3 class="center">Abschnitt 3<br />
Schutz vor Radon an Arbeitsplätzen in Innenräumen</h3>

<h4 class="center">§ 126<br />
Referenzwert</h4>

<p class="abs">Der Referenzwert für die über das Jahr gemittelte Radon-222-Aktivitätskonzentration in der Luft an Arbeitsplätzen beträgt 300 Becquerel je Kubikmeter.</p>
