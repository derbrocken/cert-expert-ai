<h4 class="center">§ 157<br />
Kosten; Ausgleichsanspruch</h4>

<p class="abs">Die Kosten der nach <a href="154.htm">§ 154</a> Absatz 3 und <a href="156.htm">§ 156</a> Absatz 3 angeordneten Maßnahmen tragen die zur Durchführung der Maßnahmen Verpflichteten. <a href="146.htm">§ 146</a> Absatz 2 gilt entsprechend.</p>
