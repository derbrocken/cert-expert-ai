<h4 class="center">§ 160<br />
Verhältnis zu den Kapiteln 1 bis 4</h4>

<p class="abs">Die Bestimmungen dieses Kapitels gelten nicht für nach einem Notfall bestehende Expositionssituationen, für Radon in Aufenthaltsräumen und am Arbeitsplatz, für radioaktiv kontaminierte Gebiete und für Radioaktivität in Bauprodukten.</p>
