<h4 class="center">§ 165<br />
Betretungsrecht und Probenahme</h4>

<p class="abs">Die Beauftragten der zuständigen Behörden sind berechtigt, Grundstücke und Betriebs- und Geschäftsräume während der Betriebs- und Arbeitszeit zu betreten, die Radioaktivität zu ermitteln und Proben zu nehmen.</p>
