<h4 class="center">§ 176<br />
Haftung für durch ionisierende Strahlung verursachte Schäden</h4>

<p class="abs">Im Anwendungsbereich dieses Gesetzes und der auf dieses Gesetz gestützten Rechtsverordnungen richtet sich die Haftung für durch ionisierende Strahlung verursachte Schäden nach den §§ 25 bis 40 des Atomgesetzes.</p>
