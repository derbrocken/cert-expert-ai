<h4 class="center">§ 193a<br />
Ausstattung der zuständigen Behörden</h4>

<p class="abs">Die zuständigen Behörden verfügen über die zur Erfüllung ihrer gesetzlichen Aufgaben erforderliche Ausstattung an Finanzmitteln und die erforderliche Personalausstattung.</p>
