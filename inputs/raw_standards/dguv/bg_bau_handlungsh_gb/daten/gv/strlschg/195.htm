<h4 class="center">§ 195<br />
Einziehung</h4>

<p class="abs">Ist eine Ordnungswidrigkeit nach <a href="194.htm">§ 194</a> Absatz 1 vorsätzlich begangen worden, so können Gegenstände eingezogen werden,</p>

<ol>
  <li>auf die sich die Ordnungswidrigkeit bezieht oder</li>
  <li>die zur Begehung oder Vorbereitung gebraucht wurden oder bestimmt gewesen sind.</li>
</ol>
