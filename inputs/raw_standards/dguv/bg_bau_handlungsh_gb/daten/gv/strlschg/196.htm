<h3 class="center">Kapitel 2<br />
Übergangsvorschriften</h3>

<h4 class="center">§ 196<br />
Genehmigungsbedürftige Errichtung von Anlagen (§ 10)</h4>

<p class="abs">Eine Genehmigung für die Errichtung von Anlagen zur Erzeugung ionisierender Strahlen, die vor dem 31. Dezember 2018 erteilt worden ist, gilt als Genehmigung nach <a href="10.htm">§ 10</a> mit allen Nebenbestimmungen fort.</p>
