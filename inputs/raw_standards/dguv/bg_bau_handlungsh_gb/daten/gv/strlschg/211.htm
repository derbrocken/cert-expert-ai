<h4 class="center">§ 211<br />
Bestellung von Strahlenschutzbeauftragten (§ 70)</h4>


<p class="abs">Eine Bestellung eines Strahlenschutzbeauftragten, die vor dem 31. Dezember 2018 erfolgt ist, gilt als Bestellung nach <a href="70.htm">§ 70</a> Absatz 1 fort.</p>
