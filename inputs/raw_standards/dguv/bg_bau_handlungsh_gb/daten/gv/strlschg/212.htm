<h4 class="center">§ 212<br />
Grenzwerte für beruflich exponierte Personen; Ermittlung der Exposition der Bevölkerung (§§ 78, 80)</h4>


<p class="abs">(1) Der Grenzwert nach <a href="78.htm">§ 78</a> Absatz 2 Nummer 1 ist ab dem 1. Januar 2019 einzuhalten.</p>
<p class="abs">(2) Für die Ermittlung der Exposition der Bevölkerung ist <a href="80.htm">§ 80</a> ab dem 1. Januar 2019 anzuwenden.</p>
