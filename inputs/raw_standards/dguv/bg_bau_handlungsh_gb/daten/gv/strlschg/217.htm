<h4 class="center">§ 217<br />
Bestimmung von Sachverständigen (§ 172)</h4>


<p class="abs">Behördliche Bestimmungen von Sachverständigen, die vor dem 31. Dezember 2018 erfolgt sind, gelten als Bestimmungen nach <a href="172.htm">§ 172</a> Absatz 1 Nummer 1, 3 oder 4 längstens fünf Jahre fort.</p>
