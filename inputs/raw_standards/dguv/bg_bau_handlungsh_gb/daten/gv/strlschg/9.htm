<h4 class="center">§ 9<br />
Dosisbegrenzung</h4>

<p class="abs">Wer eine Tätigkeit plant, ausübt oder ausüben lässt, ist verpflichtet, dafür zu sorgen, dass die Dosisgrenzwerte nicht überschritten werden, die in diesem Gesetz und in den auf Grund dieses Gesetzes erlassenen Rechtsverordnungen festgelegt sind.</p>
