<h4 class="center">§ 156<br />
Arbeitsplatzbezogene
Abschätzung der Exposition</h4>

<p class="abs">Die zuständige Behörde kann Vorgaben für die
Durchführung der Abschätzung nach § 130 Absatz 1
des Strahlenschutzgesetzes machen, um die erforderliche
Qualität der Abschätzung sicherzustellen.</p>
