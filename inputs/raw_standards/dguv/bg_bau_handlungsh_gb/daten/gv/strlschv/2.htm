<h2 class="center">Teil 2<br />
Strahlenschutz bei geplanten Expositionssituationen</h2>

<h3 class="center">Kapitel 1<br />
Rechtfertigung von Tätigkeitsarten</h3>

<h4 class="center">§ 2<br />
Nicht gerechtfertigte Tätigkeitsarten</h4>



<p class="abs">Tätigkeiten, die den in Anlage 1 genannten nicht gerechtfertigten
Tätigkeitsarten zuzuordnen sind, dürfen
nicht ausgeübt werden.</p>
