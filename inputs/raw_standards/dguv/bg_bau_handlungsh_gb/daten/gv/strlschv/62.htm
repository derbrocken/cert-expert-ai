<h4 class="center">§ 62<br />
Räume
für den Betrieb von Störstrahlern</h4>

<p class="abs">Die zuständige Behörde kann für genehmigungsbedürftige
Störstrahler zum Schutz Einzelner oder der
Allgemeinheit festlegen, dass sie nur in allseitig umschlossenen
Räumen betrieben werden dürfen.</p>
