<h4 class="center">§ 8<br />
Genehmigungsfreier Betrieb von Störstrahlern</h4>

<p class="abs">Eine Genehmigung nach § 12 Absatz 1 Nummer 5
des Strahlenschutzgesetzes ist in den in Anlage 3 Teil D
genannten Fällen nicht erforderlich.</p>
