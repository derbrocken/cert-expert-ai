<h4 class="center">§ 51<br />Besondere Kostenregelung</h4>

<p>Die Kosten der Zeichen <a href="anl3.htm#3861">386.1</a>, <a href="anl3.htm#3862">386.2</a> und <a href="anl3.htm#3863">386.3</a> trägt abweichend von § 5b Absatz 1 des Straßenverkehrsgesetzes derjenige, der die Aufstellung dieses Zeichens beantragt.</p>
