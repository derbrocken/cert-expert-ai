<h4 class="center">§ 21b<br />
Anerkennung von Prüfungen auf Grund von Rechtsakten der Europäischen Gemeinschaften</h4>

<p>Im Verfahren auf Erteilung der Betriebserlaubnis werden Prüfungen anerkannt, die auf Grund harmonisierter Vorschriften nach <a href="19.htm">§ 19 Absatz 1 Satz 2</a> durchgeführt und bescheinigt worden sind.</p>
