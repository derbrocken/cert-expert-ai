<h4 class="center">§ 33<br />
Schleppen von Fahrzeugen</h4>

<p>Fahrzeuge, die nach ihrer Bauart zum Betrieb als Kraftfahrzeug bestimmt sind, dürfen nicht als Anhänger betrieben werden.</p>
