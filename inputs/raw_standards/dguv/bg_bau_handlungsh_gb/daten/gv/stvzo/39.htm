<h4 class="center">§ 39<br />
Rückwärtsgang</h4>

<p>Kraftfahrzeuge - ausgenommen einachsige Zug- oder Arbeitsmaschinen mit einem zulässigen Gesamtgewicht von nicht mehr als 400 kg sowie Krafträder mit oder ohne Beiwagen - müssen vom Führersitz aus zum Rückwärtsfahren gebracht werden können.</p>
