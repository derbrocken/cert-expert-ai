<h4 class="center">§ 54b<br />
Windsichere Handlampe</h4>

<p>In Kraftomnibussen muss außer den nach <a href="53a.htm">§ 53a Absatz 1</a> erforderlichen Warneinrichtungen eine von der Lichtanlage des Fahrzeugs unabhängige windsichere Handlampe mitgeführt werden.</p>
