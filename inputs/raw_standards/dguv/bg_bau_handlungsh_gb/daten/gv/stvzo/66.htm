<h4 class="center">§ 66<br />
Rückspiegel</h4>

<p>Lastfahrzeuge müssen einen Spiegel für die Beobachtung der Fahrbahn nach rückwärts haben. Dies gilt nicht, wenn eine zweckentsprechende Anbringung des Rückspiegels an einem Fahrzeug technisch nicht möglich ist, ferner nicht für land- oder forstwirtschaftliche Maschinen.</p>
