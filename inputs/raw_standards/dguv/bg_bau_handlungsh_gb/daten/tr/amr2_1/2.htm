<h2>2. Begriffsbestimmungen</h2>

<p>(1) Die Frist ist der Zeitraum zwischen zwei Vorsorgeterminen oder zwischen zwei Angeboten für eine arbeitsmedizinische Vorsorge.</p>

<p>(2) Nachgehende Vorsorge ist eine besondere Form der Angebotsvorsorge (vgl. <a href="../../gv/arbmedvv/5.htm">§ 5 Absatz 3 ArbMedVV</a>).</p>
