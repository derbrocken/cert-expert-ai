<h2>7. Kostentragung</h2>



<p>Die Kosten für das Biomonitoring übernimmt der Arbeitgeber, soweit sie nicht von anderer Stelle getragen werden (zum Beispiel Unfallversicherungsträger). Den Beschäftigten dürfen die Kosten nach <a href="../../gv/arbschg/3.htm">§ 3 Absatz 3 des Arbeitsschutzgesetzes</a> nicht auferlegt werden.</p>
