<h2>1 Zielstellung</h2>

<p>Diese Arbeitsstättenregel konkretisiert die Anforderungen an Raumabmessungen von Arbeitsräumen und Bewegungsflächen in <a href="../../gv/arbstaettv/3a.htm">§ 3a Absatz 1 der Arbeitsstättenverordnung</a> sowie insbesondere in den Punkten <a href="../../gv/arbstaettv/anh_1.htm">1.2</a> und <a href="../../gv/arbstaettv/anh_3.htm">3.1</a> des Anhanges der Arbeitsstättenverordnung.</p>
