<h2>1 Zielstellung</h2>

<p>Diese Arbeitsstättenregel konkretisiert die Anforderungen für das Einrichten und Betreiben von Fußböden nach <a href="../../gv/arbstaettv/3a.htm">§ 3a</a> Absatz 1 und <a href="../../gv/arbstaettv/4.htm">§ 4</a> Absatz 2 sowie nach <a href="../../gv/arbstaettv/anh_1.htm#15">Nummer 1.5</a> Absätze 1 und 2 des Anhangs der Arbeitsstättenverordnung.</p>
