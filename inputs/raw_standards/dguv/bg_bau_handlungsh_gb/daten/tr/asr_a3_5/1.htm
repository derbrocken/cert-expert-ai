<h2>1 Zielstellung</h2>

<p>Diese Arbeitsstättenregel konkretisiert die Anforderungen an Raumtemperaturen in <a href="../../gv/arbstaettv/3.htm">§ 3 Abs. 1</a> sowie insbesondere im Punkt <a href="../../gv/arbstaettv/anh_3.htm#35">3.5</a> des Anhanges der Arbeitsstättenverordnung.</p>
