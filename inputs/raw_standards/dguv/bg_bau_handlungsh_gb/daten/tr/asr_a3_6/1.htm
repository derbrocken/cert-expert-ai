<h2>1 Zielstellung</h2>

<p>Diese ASR konkretisiert die Anforderungen an die Lüftung in <a href="../../gv/arbstaettv/3a.htm">§ 3a Abs. 1</a> und <a href="../../gv/arbstaettv/4.htm">§ 4 Abs. 3</a> sowie in <a href="../../gv/arbstaettv/anh_3.htm#36">Punkt 3.6</a> des Anhanges der Arbeitsstättenverordnung (ArbStättV).</p>
