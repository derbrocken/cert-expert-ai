<h2>1 Zielstellung</h2>

<p>Diese ASR konkretisiert die Anforderungen an Pausenräume und Pausenbereiche, Bereitschaftsräume sowie an Einrichtungen zum Hinlegen und Ausruhen für schwangere Frauen und stillende Mütter nach <a href="../../gv/arbstaettv/anh_4.htm#42">Anhang 4.2</a> und <a href="../../gv/arbstaettv/anh_5.htm#52">5.2</a> Abs. 1 b) und c) der Arbeitsstättenverordnung.</p>
