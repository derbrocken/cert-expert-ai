<h2>1 Zielstellung</h2>

<p>Diese ASR konkretisiert die in <a href="../../gv/arbstaettv/3a.htm">§ 3a Absatz 1</a> und <a href="../../gv/arbstaettv/anh_5.htm">Nummer 5.1</a> des Anhangs der Arbeitsstättenverordnung (ArbStättV) genannten Anforderungen an Arbeitsplätze in nicht allseits umschlossenen Arbeitsstätten und Arbeitsplätze im Freien.</p>
