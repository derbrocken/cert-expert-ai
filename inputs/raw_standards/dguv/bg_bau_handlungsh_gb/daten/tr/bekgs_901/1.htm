<h2>1 Anwendungsbereich</h2>

<p>Der AGS erarbeitet oder bewertet Grenzwerte für die Luft am Arbeitsplatz und übernimmt diese als Arbeitsplatzgrenzwerte (AGW) in die <a href="../trgs900/titel.htm">TRGS 900</a> "Arbeitsplatzgrenzwerte". Dabei geht der AGS nach den im Folgenden aufgeführten Kriterien vor.</p>
