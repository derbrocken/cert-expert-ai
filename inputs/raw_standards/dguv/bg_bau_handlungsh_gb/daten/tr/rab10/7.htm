<h2>7 Gleichzeitig tätig werden von mehr als 20 Beschäftigten (zu § 2 Abs. 2 BaustellV)</h2>

<p>Gleichzeitig tätig werden im Sinne der <a href="../../gv/baustellv/titel.htm">BaustellV</a> heißt, dass planmäßig mindestens 21 Beschäftigte auf der Baustelle über eine Dauer von mindestens einer Arbeitsschicht zur selben Zeit Arbeiten verrichten.</p>
